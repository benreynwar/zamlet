name: CI

# When to run this workflow
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-model-tests-a:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
      ZAMLET_TEST_SCALE: "0.1"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
        id: setup
        with:
          cache-prefix: bazel-model-a
      - name: Run Python model tests (group A)
        run: |
          nix-shell --run "bazel test //python/zamlet/tests:tests_a --test_output=errors --keep_going"
      - name: Save Bazel cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/bazel
          key: ${{ steps.setup.outputs.cache-key }}

  kernel-tests-a:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
        id: setup
        with:
          cache-prefix: bazel-kernel-a
      - name: Run kernel tests (group A)
        run: |
          nix-shell --run "bazel test //python/zamlet/kernel_tests:tests_a --test_output=errors --keep_going"
      - name: Save Bazel cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/bazel
          key: ${{ steps.setup.outputs.cache-key }}

  kernel-tests-c:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
        id: setup
        with:
          cache-prefix: bazel-kernel-c
      - name: Run kernel tests (group C)
        run: |
          nix-shell --run "bazel test //python/zamlet/kernel_tests:tests_c --test_output=errors --keep_going"
      - name: Save Bazel cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/bazel
          key: ${{ steps.setup.outputs.cache-key }}

  kernel-tests-b:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
        id: setup
        with:
          cache-prefix: bazel-kernel-b
      - name: Run kernel tests (group B)
        run: |
          nix-shell --run "bazel test //python/zamlet/kernel_tests:tests_b --test_output=errors --keep_going"
      - name: Save Bazel cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/bazel
          key: ${{ steps.setup.outputs.cache-key }}

  kernel-tests-fft:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
        id: setup
        with:
          cache-prefix: bazel-kernel-fft
      - name: Run kernel tests (FFT)
        run: |
          nix-shell --run "bazel test //python/zamlet/kernel_tests:tests_fft --test_output=errors --keep_going"
      - name: Save Bazel cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/bazel
          key: ${{ steps.setup.outputs.cache-key }}

  cocotb-tests:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
        id: setup
        with:
          cache-prefix: bazel-cocotb
      - name: Run cocotb tests
        run: |
          nix-shell --run "bazel test //python/zamlet:cocotb_tests --test_output=errors --keep_going"
      - name: Save Bazel cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/bazel
          key: ${{ steps.setup.outputs.cache-key }}

  synthesis:
    runs-on: ubuntu-latest
    env:
      CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/nix-setup
        id: setup
        with:
          cache-prefix: bazel-synth
      - name: WallaceMult8x8 flow
        run: |
          nix-shell --run "bazel build //dse/maths:WallaceMult8x8_sky130hd_mfg_report"
      - name: Upload failed step artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-WallaceMult8x8
          path: bazel-out/k8-fastbuild/bin/dse/maths/
          retention-days: 7
      - name: Save Bazel cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/bazel
          key: ${{ steps.setup.outputs.cache-key }}
